name: CI

# Validação apenas — deploy Hostinger é feito pelo hPanel + GitHub.
# O workflow deploy-api.yml é opcional (VPS/Docker), não usar na Hostinger Business.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root_password
          MYSQL_DATABASE: lardosanjos_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pci_root_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: mysql://root:ci_root_password@127.0.0.1:3306/lardosanjos_ci
      NODE_ENV: test
      JWT_SECRET: ci-jwt-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-chars
      MFA_ENCRYPTION_KEY: ci-mfa-encryption-key-32chars-min

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @lardosanjos/database exec prisma generate

      - name: Apply migrations (CI)
        run: pnpm --filter @lardosanjos/database exec prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate secrets not in repo
        run: node scripts/check-no-secrets.mjs

  docker-api:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API production image
        run: docker build -f apps/api/Dockerfile -t lardosanjos-api:ci .
