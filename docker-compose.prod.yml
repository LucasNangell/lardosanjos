# Produção — Lar dos Anjos Pet
# API NestJS + Redis + Nginx (MySQL gerenciado externamente ou via serviço abaixo)
#
# Uso:
#   cp .env.production.example .env.production
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: lardosanjos-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 4000
    depends_on:
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - lardosanjos
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4000/api/v1/health/ready']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: lardosanjos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    networks:
      - lardosanjos
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: lardosanjos-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lardosanjos}
      MYSQL_USER: ${MYSQL_APP_USER:-lardosanjos_app}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD:?Defina MYSQL_APP_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Defina MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_prod_data:/var/lib/mysql
    networks:
      - lardosanjos
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          '127.0.0.1',
          '-u',
          'root',
          '-p${MYSQL_ROOT_PASSWORD}',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  backup:
    build:
      context: .
      dockerfile: deploy/backup/Dockerfile
    container_name: lardosanjos-backup
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-12}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - lardosanjos
    volumes:
      - backup_tmp:/tmp/backups

  nginx:
    image: nginx:1.27-alpine
    container_name: lardosanjos-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx/lardosanjos.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - ./deploy/nginx/certbot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - lardosanjos

networks:
  lardosanjos:
    driver: bridge

volumes:
  mysql_prod_data:
  redis_prod_data:
  backup_tmp:
